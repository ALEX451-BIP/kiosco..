            function procesarExcel(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(sheet);
                        if (!rows.length) { toast("El Excel está vacío", true); return; }

                        const headers = Object.keys(rows[0]);
                        function findColumn(matches) {
                            for (let h of headers) {
                                const hLower = h.toLowerCase().trim();
                                for (let m of matches) {
                                    if (hLower === m.toLowerCase().trim()) return h;
                                }
                            }
                            return null;
                        }
                        const colNombre = findColumn(['concepto', 'nombre', 'producto']);
                        const colPrecio = findColumn(['precio venta', 'precio', 'precioventa']);
                        const colStock = findColumn(['stock']);
                        const colCodigo = findColumn(['codigo', 'código']);
                        const colCosto = findColumn(['costo']);
                        const colCategoria = findColumn(['familia', 'categoría', 'categoria']);
                        const colProveedor = findColumn(['proveedor']);
                        const colTipoVenta = findColumn(['tipo_venta', 'tipoventa', 'tipo']);
                        const colPrecioKg = findColumn(['precio_kg', 'preciokg', 'preciokilo']);
                        const colPrecioEspecial = findColumn(['precio_especial', 'precioesp']);
                        const colHoraInicio = findColumn(['hora_inicio', 'horainicio']);
                        const colHoraFin = findColumn(['hora_fin', 'horafin']);

                        if (!colNombre || !colPrecio || !colStock) {
                            toast("El Excel debe tener columnas: CONCEPTO, PRECIO VENTA, STOCK (al menos)", true);
                            return;
                        }

                        let agregados = 0;
                        for (let row of rows) {
                            const nombre = String(row[colNombre] || '').trim();
                            const precio = parseFloat(row[colPrecio]) || 0;
                            const stock = parseInt(row[colStock]) || 0;
                            const codigo = String(row[colCodigo] || '').trim();
                            const costo = parseFloat(row[colCosto]) || 0;
                            const catNombre = String(row[colCategoria] || '').trim();
                            const provNombre = String(row[colProveedor] || '').trim();
                            let tipoVenta = 'unidad';
                            if (colTipoVenta) {
                                const tv = String(row[colTipoVenta] || '').trim().toLowerCase();
                                if (tv === 'peso') tipoVenta = 'peso';
                            }
                            let precioKg = null;
                            if (colPrecioKg) {
                                precioKg = parseFloat(row[colPrecioKg]) || null;
                            }
                            let precioEspecial = null;
                            if (colPrecioEspecial) {
                                const pe = parseFloat(row[colPrecioEspecial]);
                                if (!isNaN(pe) && pe > 0) precioEspecial = pe;
                            }
                            let horaInicio = null;
                            if (colHoraInicio) {
                                const hi = String(row[colHoraInicio] || '').trim();
                                if (hi) horaInicio = hi;
                            }
                            let horaFin = null;
                            if (colHoraFin) {
                                const hf = String(row[colHoraFin] || '').trim();
                                if (hf) horaFin = hf;
                            }

                            if (!nombre || isNaN(precio) || precio <= 0) continue;

                            let categoriaId = null;
                            if (catNombre) {
                                let cat = categorias.find(c => c.nombre.toLowerCase() === catNombre.toLowerCase());
                                if (!cat) {
                                    cat = { id: Date.now() + Math.random() * 1000, nombre: catNombre };
                                    categorias.push(cat);
                                }
                                categoriaId = cat.id;
                            }
                            if (!categoriaId && categorias.length) categoriaId = categorias[0].id;

                            let proveedorId = null;
                            if (provNombre) {
                                let prov = proveedores.find(p => p.nombre.toLowerCase() === provNombre.toLowerCase());
                                if (!prov) {
                                    prov = { id: Date.now() + Math.random() * 1000, nombre: provNombre, contacto: '',
                                        telefono: '', productosIds: [], deuda: 0, pedidos: [] };
                                    proveedores.push(prov);
                                }
                                proveedorId = prov.id;
                            }

                            let existing = productos.find(p => p.codigo === codigo && codigo !== '');
                            if (existing) {
                                existing.nombre = nombre;
                                existing.precio = precio;
                                existing.stock = stock;
                                existing.costo = costo;
                                existing.categoriaId = categoriaId;
                                existing.proveedorId = proveedorId;
                                existing.tipoVenta = tipoVenta;
                                existing.precioPorKilo = precioKg;
                                existing.precioEspecial = precioEspecial;
                                existing.horaInicioEspecial = horaInicio;
                                existing.horaFinEspecial = horaFin;
                            } else {
                                productos.push({
                                    id: Date.now() + Math.random() * 10000,
                                    nombre,
                                    precio,
                                    stock,
                                    emoji: '📦',
                                    costo,
                                    proveedorId,
                                    categoriaId,
                                    codigo: codigo || '',
                                    ventasTotales: 0,
                                    vencimiento: null,
                                    tipoVenta: tipoVenta,
                                    precioPorKilo: precioKg,
                                    precioEspecial: precioEspecial,
                                    horaInicioEspecial: horaInicio,
                                    horaFinEspecial: horaFin
                                });
                            }
                            agregados++;
                        }
                        saveAll();
                        renderTablaConFiltro();
                        if (document.getElementById("ventas").classList.contains("active")) renderVentas();
                        toast(`✅ ${agregados} productos procesados desde Excel`);
                    } catch (err) {
                        toast("Error al leer el Excel: " + err.message, true);
                        console.error(err);
                    }
                };
                reader.readAsArrayBuffer(file);
            }

            function exportarProductosExcel() {
                if (!productos.length) { toast("No hay productos para exportar", true); return; }
                const data = productos.map(p => ({
                    'CODIGO': p.codigo || '',
                    'CONCEPTO': p.nombre,
                    'COSTO': p.costo || 0,
                    'PRECIO VENTA': p.precio,
                    'STOCK': p.stock,
                    'FAMILIA': categorias.find(c => c.id === p.categoriaId)?.nombre || '',
                    'PROVEEDOR': proveedores.find(pr => pr.id === p.proveedorId)?.nombre || '',
                    'TIPO_VENTA': p.tipoVenta || 'unidad',
                    'PRECIO_KG': p.precioPorKilo || '',
                    'PRECIO_ESPECIAL': p.precioEspecial || '',
                    'HORA_INICIO': p.horaInicioEspecial || '',
                    'HORA_FIN': p.horaFinEspecial || ''
                }));
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, "Productos");
                const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([wbout], { type: 'application/octet-stream' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `productos_${new Date().toISOString().slice(0,10)}.xlsx`;
                link.click();
                URL.revokeObjectURL(link.href);
                toast("✅ Productos exportados a Excel");
            }

            document.getElementById("exportExcelBtn").addEventListener("click", exportarProductosExcel);

            document.getElementById("borrarTodosBtn").addEventListener("click", async function() {
                if (!await ensureAdmin()) return;
                if (!confirm("⚠️ ¿Estás seguro de que querés borrar TODOS los productos?\nEsta acción no se puede deshacer.")) {
                    return;
                }
                const texto = prompt("Confirmá escribiendo 'BORRAR' en el cuadro de texto y presionando Aceptar, o Cancelá para abortar.");
                if (texto !== "BORRAR") {
                    toast("Operación cancelada", false);
                    return;
                }
                productos = [];
                carrito = [];
                saveAll();
                renderTablaConFiltro();
                if (document.getElementById("ventas").classList.contains("active")) {
                    renderVentas();
                }
                if (document.getElementById("rapido").classList.contains("active")) {
                    renderModoRapido();
                }
                toast("✅ Todos los productos han sido eliminados permanentemente.");
            });

            const renderTablaConFiltro = () => {
                const searchTerm = document.getElementById("adminSearchInput")?.value.toLowerCase() || "";
                let filtered = productos.filter(p => p.nombre.toLowerCase().includes(searchTerm) || (p.codigo && p
                    .codigo.toLowerCase().includes(searchTerm)));
                let tbody = document.getElementById("adminTableBody");
                if (!tbody) return;
                tbody.innerHTML = filtered.map(p => {
                    let catNombre = categorias.find(c => c.id == p.categoriaId)?.nombre || '-';
                    let fechaVenc = p.vencimiento ? new Date(p.vencimiento).toLocaleDateString() : '-';
                    let precioDisplay = p.tipoVenta === 'peso' ? `$${p.precioPorKilo || p.precio}/kg` :
                        `$${p.precio}`;
                    let horarioEsp = p.precioEspecial ? `${formatearHora(p.horaInicioEspecial)}-${formatearHora(p.horaFinEspecial)}` : '-';
                    return `<tr>
                        <td>${escapeHtml(p.emoji||'📦')}</td>
                        <td>${escapeHtml(p.nombre)}</td>
                        <td>${precioDisplay}</td>
                        <td>${p.tipoVenta}</td>
                        <td>${p.precioPorKilo ? '$'+p.precioPorKilo : '-'}</td>
                        <td>${p.precioEspecial ? '$'+p.precioEspecial : '-'}</td>
                        <td>${horarioEsp}</td>
                        <td>${p.stock}</td>
                        <td>${escapeHtml(catNombre)}</td>
                        <td>${escapeHtml(proveedores.find(pr=>pr.id===p.proveedorId)?.nombre||'-')}</td>
                        <td>${escapeHtml(p.codigo||'-')}</td>
                        <td>${fechaVenc}</td>
                        <td>
                            <button class="btn btn-outline" onclick="editarProductoModal(${p.id})">✏️</button>
                            <button class="btn btn-outline" onclick="eliminarProducto(${p.id})">❌</button>
                        </td>
                    </tr>`;
                }).join('');
                if (filtered.length === 0 && searchTerm)
                    tbody.innerHTML =
                    `<tr><td colspan="13" style="text-align:center;">🔍 No se encontraron productos con "${escapeHtml(searchTerm)}"</td></tr>`;
            };
            window.cargarTablaAdmin = renderTablaConFiltro;

            const searchInput = document.getElementById("adminSearchInput");
            const clearBtn = document.getElementById("clearAdminSearchBtn");
            if (searchInput) searchInput.addEventListener("input", () => renderTablaConFiltro());
            if (clearBtn) clearBtn.addEventListener("click", () => { if (searchInput) searchInput.value = "";
                renderTablaConFiltro(); });

            window.editarProductoModal = (id) => {
                let p = productos.find(pr => pr.id === id);
                if (!p) return;
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
                    <div class="modal-card">
                        <h3>✏️ Editar producto</h3>
                        <input id="editNombre" placeholder="Nombre" value="${escapeHtml(p.nombre)}">
                        <input id="editPrecio" type="number" placeholder="Precio" value="${p.precio}">
                        <input id="editCosto" type="number" placeholder="Costo" value="${p.costo||0}">
                        <div style="display:flex; gap:8px;">
                            <input id="editMargen" type="number" placeholder="% Ganancia" style="flex:1;" step="any" min="0">
                            <button id="calcEditPrecioBtn" class="btn btn-warning">🧮 Calcular precio</button>
                        </div>
                        <input id="editStock" type="number" placeholder="Stock" value="${p.stock}">
                        <input id="editEmoji" placeholder="Emoji" value="${escapeHtml(p.emoji||'📦')}">
                        <input id="editCodigo" placeholder="Código" value="${escapeHtml(p.codigo||'')}">
                        <input id="editVencimiento" type="date" value="${p.vencimiento||''}">
                        <select id="editTipoVenta">
                            <option value="unidad" ${p.tipoVenta==='unidad'?'selected':''}>Unidad</option>
                            <option value="peso" ${p.tipoVenta==='peso'?'selected':''}>Peso (kg)</option>
                        </select>
                        <input id="editPrecioPorKilo" type="number" placeholder="Precio/kg" step="0.01" value="${p.precioPorKilo||''}">
                        <input id="editPrecioEspecial" type="number" placeholder="Precio especial" step="0.01" value="${p.precioEspecial||''}">
                        <input id="editHoraInicio" type="time" value="${p.horaInicioEspecial||''}">
                        <input id="editHoraFin" type="time" value="${p.horaFinEspecial||''}">
                        <select id="editCategoria">${categorias.map(c=>`<option value="${c.id}" ${p.categoriaId==c.id?'selected':''}>${escapeHtml(c.nombre)}</option>`).join('')}</select>
                        <select id="editProveedor"><option value="">Sin proveedor</option>${proveedores.map(pr=>`<option value="${pr.id}" ${p.proveedorId==pr.id?'selected':''}>${escapeHtml(pr.nombre)}</option>`).join('')}</select>
                        <div style="display:flex; gap:14px; margin-top:18px;">
                            <button id="guardarEditBtn" class="btn btn-primary">Guardar</button>
                            <button id="cancelEditBtn" class="btn btn-outline">Cancelar</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                document.getElementById("calcEditPrecioBtn").addEventListener("click", () => {
                    const costo = parseFloat(document.getElementById("editCosto").value);
                    const margen = parseFloat(document.getElementById("editMargen").value);
                    if (isNaN(costo) || costo <= 0) { toast("Costo válido", true); return; }
                    if (isNaN(margen) || margen < 0) { toast("Porcentaje válido", true); return; }
                    const precioCalc = calcularPrecioDesdeMargen(costo, margen);
                    document.getElementById("editPrecio").value = precioCalc.toFixed(2);
                    toast(`✅ Precio: $${precioCalc.toFixed(2)}`);
                });

                document.getElementById("guardarEditBtn").onclick = () => {
                    p.nombre = document.getElementById("editNombre").value.trim();
                    p.precio = parseFloat(document.getElementById("editPrecio").value);
                    p.costo = parseFloat(document.getElementById("editCosto").value) || 0;
                    p.stock = parseInt(document.getElementById("editStock").value);
                    p.emoji = document.getElementById("editEmoji").value.trim() || "📦";
                    p.codigo = document.getElementById("editCodigo").value.trim();
                    p.vencimiento = document.getElementById("editVencimiento").value || null;
                    p.tipoVenta = document.getElementById("editTipoVenta").value;
                    const precioKg = parseFloat(document.getElementById("editPrecioPorKilo").value);
                    p.precioPorKilo = (p.tipoVenta === 'peso' && !isNaN(precioKg) && precioKg > 0) ? precioKg : null;
                    const precioEspecial = parseFloat(document.getElementById("editPrecioEspecial").value);
                    p.precioEspecial = (!isNaN(precioEspecial) && precioEspecial > 0) ? precioEspecial : null;
                    p.horaInicioEspecial = document.getElementById("editHoraInicio").value || null;
                    p.horaFinEspecial = document.getElementById("editHoraFin").value || null;
                    p.categoriaId = parseInt(document.getElementById("editCategoria").value);
                    p.proveedorId = parseInt(document.getElementById("editProveedor").value) || null;
                    if (isNaN(p.precio) || isNaN(p.stock)) { toast("Precio y stock deben ser números", true); return; }
                    saveAll();
                    renderTablaConFiltro();
                    if (document.getElementById("ventas").classList.contains("active")) renderVentas();
                    toast("Producto actualizado");
                    modal.remove();
                };
                document.getElementById("cancelEditBtn").onclick = () => modal.remove();
            };

            window.eliminarProducto = (id) => {
                if (confirm("¿Eliminar producto?")) {
                    carrito = carrito.filter(i => i.id !== id);
                    productos = productos.filter(p => p.id !== id);
                    saveAll();
                    renderTablaConFiltro();
                    if (document.getElementById("ventas").classList.contains("active")) renderVentas();
                    toast("Producto eliminado");
                }
            };

            document.getElementById("calcPrecioBtn").addEventListener("click", () => {
                const costo = parseFloat(document.getElementById("prodCosto").value);
                const margen = parseFloat(document.getElementById("prodMargen").value);
                if (isNaN(costo) || costo <= 0) { toast("Ingrese costo válido", true); return; }
                if (isNaN(margen) || margen < 0) { toast("Porcentaje válido", true); return; }
                const precioCalc = calcularPrecioDesdeMargen(costo, margen);
                document.getElementById("prodPrecio").value = precioCalc.toFixed(2);
                toast(`✅ Precio: $${precioCalc.toFixed(2)}`);
            });

            document.getElementById("guardarProdBtn").onclick = () => {
                let nombre = document.getElementById("prodNombre").value.trim();
                let precio = parseFloat(document.getElementById("prodPrecio").value);
                let costo = parseFloat(document.getElementById("prodCosto").value) || 0;
                let stock = parseInt(document.getElementById("prodStock").value);
                let emoji = document.getElementById("prodEmoji").value.trim() || "📦";
                let codigo = document.getElementById("prodCodigo").value.trim();
                let provId = parseInt(document.getElementById("prodProv").value) || null;
                let catId = parseInt(document.getElementById("prodCategoria").value) || (categorias.length ? categorias[0]
                    .id : null);
                let tipoVenta = document.getElementById("prodTipoVenta").value;
                let precioKg = parseFloat(document.getElementById("prodPrecioPorKilo").value);
                let precioEspecial = parseFloat(document.getElementById("prodPrecioEspecial").value);
                let horaInicio = document.getElementById("prodHoraInicio").value || null;
                let horaFin = document.getElementById("prodHoraFin").value || null;
                let editId = document.getElementById("editProdId").value;
                if (!nombre || isNaN(precio) || isNaN(stock)) { toast("Complete campos", true); return; }
                if (tipoVenta === 'peso' && (isNaN(precioKg) || precioKg <= 0)) {
                    toast("Para venta por peso, ingresa el precio por kilo", true);
                    return;
                }
                if (precioEspecial && precioEspecial > 0 && (!horaInicio || !horaFin)) {
                    toast("Para usar precio especial, debes definir hora inicio y fin", true);
                    return;
                }
                if (editId) {
                    let idx = productos.findIndex(p => p.id == editId);
                    if (idx !== -1) productos[idx] = { ...productos[idx], nombre, precio, costo, stock, emoji,
                        proveedorId: provId, categoriaId: catId, codigo, vencimiento: null, tipoVenta,
                        precioPorKilo: (tipoVenta === 'peso' ? precioKg : null),
                        precioEspecial: (precioEspecial && precioEspecial > 0) ? precioEspecial : null,
                        horaInicioEspecial: horaInicio,
                        horaFinEspecial: horaFin
                    };
                    toast("Producto actualizado");
                } else {
                    let newId = Date.now();
                    productos.push({
                        id: newId,
                        nombre,
                        precio,
                        costo,
                        stock,
                        emoji,
                        proveedorId: provId,
                        categoriaId: catId,
                        codigo,
                        ventasTotales: 0,
                        vencimiento: null,
                        tipoVenta,
                        precioPorKilo: (tipoVenta === 'peso' ? precioKg : null),
                        precioEspecial: (precioEspecial && precioEspecial > 0) ? precioEspecial : null,
                        horaInicioEspecial: horaInicio,
                        horaFinEspecial: horaFin
                    });
                    toast("Producto agregado");
                }
                saveAll();
                renderTablaConFiltro();
                if (document.getElementById("ventas").classList.contains("active")) renderVentas();
                document.getElementById("editProdId").value = "";
                document.getElementById("prodNombre").value = "";
                document.getElementById("prodPrecio").value = "";
                document.getElementById("prodCosto").value = "";
                document.getElementById("prodMargen").value = "";
                document.getElementById("prodStock").value = "";
                document.getElementById("prodEmoji").value = "📦";
                document.getElementById("prodCodigo").value = "";
                document.getElementById("prodTipoVenta").value = "unidad";
                document.getElementById("prodPrecioPorKilo").value = "";
                document.getElementById("prodPrecioEspecial").value = "";
                document.getElementById("prodHoraInicio").value = "";
                document.getElementById("prodHoraFin").value = "";
            };

            document.getElementById("limpiarProdBtn").onclick = () => {
                document.getElementById("prodNombre").value = "";
                document.getElementById("prodPrecio").value = "";
                document.getElementById("prodCosto").value = "";
                document.getElementById("prodMargen").value = "";
                document.getElementById("prodStock").value = "";
                document.getElementById("prodEmoji").value = "📦";
                document.getElementById("prodCodigo").value = "";
                document.getElementById("prodProv").value = "";
                document.getElementById("prodCategoria").value = "";
                document.getElementById("editProdId").value = "";
                document.getElementById("prodTipoVenta").value = "unidad";
                document.getElementById("prodPrecioPorKilo").value = "";
                document.getElementById("prodPrecioEspecial").value = "";
                document.getElementById("prodHoraInicio").value = "";
                document.getElementById("prodHoraFin").value = "";
            };

            renderTablaConFiltro();
            renderCategoriasAdmin();
        }

        // ===== RENDER EMPLEADOS EN ADMIN =====
        function renderEmpleadosAdmin() {
            const container = document.getElementById("empleadosAdminContainer");
            if (!container) return;
            limpiarEmpleadosDuplicados();
            let html = `<table class="data-table"><thead><tr><th>ID</th><th>Nombre</th><th>Estado Pago</th><th>Acciones</th></tr></thead><tbody>`;
            if (empleados.length === 0) {
                html += `<tr><td colspan="4" style="text-align:center;">No hay empleados registrados</td></tr>`;
            } else {
                empleados.forEach(emp => {
                    const estadoPago = emp.estadoPago === 'pagado' ? '✅ Pagado' : '❌ Pendiente';
                    html += `<tr>
                        <td>${emp.id}</td>
                        <td>${escapeHtml(emp.nombre)}</td>
                        <td>${estadoPago}</td>
                        <td>
                            <button class="btn btn-outline" onclick="editarEmpleadoAdmin(${emp.id})">✏️ Editar</button>
                            <button class="btn btn-danger" onclick="eliminarEmpleadoAdmin(${emp.id})">🗑️ Eliminar</button>
                        </td>
                    </tr>`;
                });
            }
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        window.eliminarEmpleadoAdmin = (id) => {
            const emp = empleados.find(e => e.id === id);
            if (!emp) { toast("Empleado no encontrado", true); return; }
            if (!confirm(`⚠️ ¿Eliminar a "${emp.nombre}" definitivamente?\nSe borrarán todos sus turnos y ya no podrá iniciar sesión.`)) return;

            empleados = empleados.filter(e => e.id !== id);
            turnos = turnos.filter(t => t.empleadoId !== id);
            if (currentEmployeeId === id) {
                userMode = "admin";
                currentEmployeeId = null;
                localStorage.setItem(PREF + 'userMode', 'admin');
                localStorage.removeItem(PREF + 'currentEmployeeId');
                actualizarModoUsuarioUI();
                toast(`Empleado "${emp.nombre}" eliminado. Sesión cambiada a Administrador.`);
            } else {
                toast(`Empleado "${emp.nombre}" eliminado correctamente.`);
            }
            guardarEmpleadosTurnos();
            saveAll();
            renderEmpleadosAdmin();
            if (document.getElementById("turnos").classList.contains("active")) renderTurnos();
            const configEmpList = document.getElementById('employeeListConfig');
            if (configEmpList) renderEmployeeListConfig();
        };

        window.editarEmpleadoAdmin = (id) => {
            const emp = empleados.find(e => e.id === id);
            if (!emp) return;
            const nuevoNombre = prompt("Nuevo nombre:", emp.nombre);
            if (nuevoNombre && nuevoNombre.trim()) {
                emp.nombre = nuevoNombre.trim();
                saveAll();
                renderEmpleadosAdmin();
                if (document.getElementById("turnos").classList.contains("active")) renderTurnos();
                const configEmpList = document.getElementById('employeeListConfig');
                if (configEmpList) renderEmployeeListConfig();
                toast("Empleado actualizado");
            }
        };

        function renderEmployeeListConfig() {
            const container = document.getElementById('employeeListConfig');
            if (!container) return;
            limpiarEmpleadosDuplicados();
            if (empleados.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);">No hay empleados registrados.</p>';
                return;
            }
            let html = '';
            empleados.forEach(emp => {
                html += `<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 8px; border-bottom:1px solid var(--border);">
                    <span>${escapeHtml(emp.nombre)}</span>
                    <div>
                        <button class="btn btn-outline" style="padding:2px 12px; font-size:0.8rem;" onclick="editarEmpleadoAdmin(${emp.id})">✏️</button>
                        <button class="btn btn-danger" style="padding:2px 12px; font-size:0.8rem;" onclick="eliminarEmpleadoAdmin(${emp.id})">🗑️</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderCategoriasAdmin() {
            let div = document.getElementById("categoriasAdmin");
            if (!div) return;
            div.innerHTML = `
                <div style="display:flex; gap:10px; margin-bottom:12px;">
                    <input id="nuevaCategoria" placeholder="Nueva categoría" style="flex:1; padding:10px; border-radius:14px;">
                    <button id="addCategoriaBtn" class="btn btn-primary">+ Agregar</button>
                </div>
                <ul style="font-size:1rem;">${categorias.map(c=>`<li style="margin:6px 0;">${escapeHtml(c.nombre)} <button class="btn btn-outline" onclick="eliminarCategoria(${c.id})">Eliminar</button></li>`).join('')}</ul>
            `;
            document.getElementById("addCategoriaBtn")?.addEventListener("click", () => {
                let nombre = document.getElementById("nuevaCategoria").value.trim();
                if (nombre && !categorias.find(c => c.nombre === nombre)) {
                    categorias.push({ id: Date.now(), nombre });
                    saveAll();
                    renderCategoriasAdmin();
                    if (document.getElementById("admin").classList.contains("active")) renderAdmin();
                    if (document.getElementById("ventas").classList.contains("active")) renderVentas();
                    toast("Categoría agregada");
                } else toast("Nombre inválido o duplicado", true);
            });
        }

        window.eliminarCategoria = (id) => {
            if (confirm("Eliminar categoría?")) {
                categorias = categorias.filter(c => c.id !== id);
                productos.forEach(p => { if (p.categoriaId == id) p.categoriaId = null; });
                saveAll();
                renderCategoriasAdmin();
                if (document.getElementById("admin").classList.contains("active")) renderAdmin();
                if (document.getElementById("ventas").classList.contains("active")) renderVentas();
                toast("Categoría eliminada");
            }
        };

        // ========================================================================
        //  CONFIG
        // ========================================================================
        function showConfig() {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <button class="modal-close-btn" id="configCloseBtn" title="Cerrar configuración">✕</button>
                    <h2>⚙️ Configuración General</h2>
                    <input id="confNombre" placeholder="Nombre negocio" value="${escapeHtml(negocio.nombre)}">
                    <input id="confWhats" placeholder="WhatsApp número" value="${escapeHtml(config.whatsappNumber)}">
                    <textarea id="confMsg" rows="2" placeholder="Mensaje plantilla">${escapeHtml(config.whatsappMessage)}</textarea>
                    <div class="config-group"><label>📦 Umbral de stock bajo (unidades)</label><input id="confStock" type="number" value="${config.lowStockThreshold}" placeholder="Stock mínimo"></div>
                    <div class="config-group"><label>⏰ Días de anticipación para alerta de vencimiento</label><input id="confVencimiento" type="number" value="${config.vencimientoAlertDays}" placeholder="Días antes para avisar"></div>

                    <div class="config-group">
                        <label>🔍 Tamaño de la interfaz (zoom)</label>
                        <div style="display:flex; align-items:center; gap:14px;">
                            <button id="zoomMinus" class="btn btn-outline" style="padding:4px 16px; font-size:1.5rem;">−</button>
                            <span id="zoomLevelDisplay" style="font-weight:700; min-width:60px; text-align:center;">${Math.round(config.zoomLevel*100)}%</span>
                            <button id="zoomPlus" class="btn btn-outline" style="padding:4px 16px; font-size:1.5rem;">+</button>
                            <button id="zoomReset" class="btn btn-outline" style="padding:4px 16px;">100%</button>
                        </div>
                        <input type="range" id="zoomSlider" min="0.6" max="1.6" step="0.02" value="${config.zoomLevel}" style="width:100%;">
                    </div>

                    <label style="display:flex; align-items:center; gap:10px; font-size:1rem;">
                        <input type="checkbox" id="confSonido" ${config.sonidoVenta?'checked':''}> Sonido venta
                    </label>
                    <label style="display:flex; align-items:center; gap:10px; font-size:1rem; margin-top:8px;">
                        <input type="checkbox" id="confMostrarTicket" ${config.mostrarTicket !== false ? 'checked' : ''}> 
                        Mostrar ticket de impresión al finalizar venta
                    </label>

                    <hr>
                    <h4>👥 Gestión de Empleados</h4>
                    <div style="margin:10px 0;">
                        <button id="addEmpFromConfig" class="btn btn-primary">+ Agregar Empleado</button>
                    </div>
                    <div id="employeeListConfig" style="max-height:150px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; padding:8px; margin-bottom:10px;">
                        <!-- Se llena con renderEmployeeListConfig() -->
                    </div>

                    <hr>
                    <h4>🔐 Cambiar PIN de Administrador</h4>
                    <div style="display:flex; gap:14px; margin-top:18px; padding-bottom: 8px;">
                        <button id="saveConfBtn" class="btn btn-primary">Guardar Configuración</button>
                        <button id="closeConfBtn" class="btn btn-outline">Cerrar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            renderEmployeeListConfig();

            document.getElementById("addEmpFromConfig").addEventListener("click", () => {
                const nombre = prompt("Nombre del nuevo empleado:");
                if (nombre && nombre.trim()) {
                    empleados.push({ id: Date.now(), nombre: nombre.trim(), activo: true, estadoPago: "pendiente",
                    pagos: [] });
                    saveAll();
                    renderEmployeeListConfig();
                    if (document.getElementById("admin").classList.contains("active")) renderEmpleadosAdmin();
                    toast("Empleado agregado correctamente");
                }
            });

            const zoomSlider = document.getElementById('zoomSlider');
            const zoomDisplay = document.getElementById('zoomLevelDisplay');
            const zoomMinus = document.getElementById('zoomMinus');
            const zoomPlus = document.getElementById('zoomPlus');
            const zoomReset = document.getElementById('zoomReset');

            function actualizarZoom(valor) {
                const val = parseFloat(valor);
                if (isNaN(val)) return;
                config.zoomLevel = Math.min(1.6, Math.max(0.6, val));
                document.body.style.fontSize = (17 * config.zoomLevel) + 'px';
                zoomDisplay.textContent = Math.round(config.zoomLevel * 100) + '%';
                zoomSlider.value = config.zoomLevel;
                localStorage.setItem('zoomLevel', config.zoomLevel);
            }

            zoomSlider.addEventListener('input', (e) => actualizarZoom(e.target.value));
            zoomMinus.addEventListener('click', () => actualizarZoom(config.zoomLevel - 0.05));
            zoomPlus.addEventListener('click', () => actualizarZoom(config.zoomLevel + 0.05));
            zoomReset.addEventListener('click', () => actualizarZoom(1.0));

            function cerrarConfig() {
                modal.remove();
            }

            const closeX = modal.querySelector('#configCloseBtn');
            const closeBtn = modal.querySelector('#closeConfBtn');
            if (closeX) closeX.addEventListener('click', cerrarConfig);

        function getAccountingDateRange() {
            let start, end = new Date();
            if (accountingPeriod === 'today') {
                start = new Date();
                start.setHours(0, 0, 0, 0);
                end = new Date();
                end.setHours(23, 59, 59, 999);
            } else if (accountingPeriod === 'week') {
                start = new Date();
                start.setDate(start.getDate() - start.getDay() + (start.getDay() === 0 ? -6 : 1));
                start.setHours(0, 0, 0, 0);
                end = new Date();
                end.setHours(23, 59, 59, 999);
            } else if (accountingPeriod === 'month') {
                start = new Date();
                start.setDate(1);
                start.setHours(0, 0, 0, 0);
                end = new Date();
                end.setHours(23, 59, 59, 999);
            } else if (accountingPeriod === 'custom') {
                start = new Date(document.getElementById('startDate')?.value);
                end = new Date(document.getElementById('endDate')?.value);
                end.setHours(23, 59, 59, 999);
            }
            return { start, end };
        }

        function destroyAccountingCharts() {
            if (accountingChart) { accountingChart.destroy();
                accountingChart = null; }
            if (expensesCategoryChart) { expensesCategoryChart.destroy();
                expensesCategoryChart = null; }
            if (topExpenseCatChart) { topExpenseCatChart.destroy();
                topExpenseCatChart = null; }
            if (ingresosGastosPieChart) { ingresosGastosPieChart.destroy();
                ingresosGastosPieChart = null; }
        }

        function actualizarContabilidad() {
            destroyAccountingCharts();
            const { start, end } = getAccountingDateRange();
            const ventasPeriodo = ventas.filter(v => !v.devuelta && new Date(v.fecha) >= start && new Date(v.fecha) <= end);
            const totalVentas = ventasPeriodo.reduce((s, v) => s + v.total, 0);
            const gastosPeriodo = gastos.filter(g => new Date(g.fecha) >= start && new Date(g.fecha) <= end);
            const totalGastos = gastosPeriodo.reduce((s, g) => s + g.monto, 0);
            const gananciaNeta = totalVentas - totalGastos;
            const margenNeto = totalVentas > 0 ? (gananciaNeta / totalVentas) * 100 : 0;
            actualizarSaldoCaja();
            const saldoCaja = calcularSaldoCaja();

            const kpiDiv = document.getElementById("accountingKpiGrid");
            if (kpiDiv) kpiDiv.innerHTML = `
                <div class="kpi-card"><div class="kpi-title">💰 Ventas totales</div><div class="kpi-value">$${totalVentas.toFixed(2)}</div></div>
                <div class="kpi-card"><div class="kpi-title">📉 Gastos totales</div><div class="kpi-value">$${totalGastos.toFixed(2)}</div></div>
                <div class="kpi-card"><div class="kpi-title">💵 Ganancia Neta</div><div class="kpi-value">$${gananciaNeta.toFixed(2)}</div></div>
                <div class="kpi-card"><div class="kpi-title">📊 Margen Neto</div><div class="kpi-value">${margenNeto.toFixed(1)}%</div></div>
                <div class="kpi-card"><div class="kpi-title">💲 Saldo Caja</div><div class="kpi-value">$${saldoCaja.toFixed(2)}</div></div>
            `;

            const daysDiff = Math.max(1, Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1);
            const labels = [];
            const ventasDaily = [];
            const gastosDaily = [];
            for (let i = 0; i < daysDiff; i++) {
                const day = new Date(start);
                day.setDate(start.getDate() + i);
                const dayStr = day.toISOString().split('T')[0];
                labels.push(day.toLocaleDateString('es', { day: 'numeric', month: 'short' }));
                const ventasDay = ventasPeriodo.filter(v => new Date(v.fecha).toISOString().split('T')[0] === dayStr)
                    .reduce((s, v) => s + v.total, 0);
                const gastosDay = gastosPeriodo.filter(g => new Date(g.fecha).toISOString().split('T')[0] === dayStr)
                    .reduce((s, g) => s + g.monto, 0);
                ventasDaily.push(ventasDay);
                gastosDaily.push(gastosDay);
            }

            const ctxLine = document.getElementById('accountingLineChart')?.getContext('2d');
            if (ctxLine) {
                accountingChart = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [
                            { label: 'Ventas ($)', data: ventasDaily, borderColor: '#d63384',
                                backgroundColor: 'rgba(214,51,132,0.1)', tension: 0.3, fill: true },
                            { label: 'Gastos ($)', data: gastosDaily, borderColor: '#dc2626',
                                backgroundColor: 'rgba(220,38,38,0.1)', tension: 0.3, fill: true }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: true }
                });
            }

            const catMap = new Map();
            gastosPeriodo.forEach(g => { const cat = g.categoria || "General";
                catMap.set(cat, (catMap.get(cat) || 0) + g.monto); });
            const pieCtx = document.getElementById('expensesPieChart')?.getContext('2d');
            if (pieCtx) {
                if (catMap.size === 0) {
                    pieCtx.clearRect(0, 0, pieCtx.canvas.width, pieCtx.canvas.height);
                    pieCtx.fillStyle = '#94a3b8';
                    pieCtx.font = '14px system-ui';
                    pieCtx.fillText('Sin gastos', 20, 100);
                } else {
                    expensesCategoryChart = new Chart(pieCtx, {
                        type: 'pie',
                        data: {
                            labels: Array.from(catMap.keys()),
                            datasets: [{ data: Array.from(catMap.values()), backgroundColor: ['#d63384',
                                    '#f59e0b', '#10b981', '#8b5cf6', '#dc2626', '#64748b'
                                ] }]
                        },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                }
            }

            const sortedCats = Array.from(catMap.entries()).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const barCtx = document.getElementById('topExpenseCatChart')?.getContext('2d');
            if (barCtx) {
                if (sortedCats.length === 0) {
                    barCtx.clearRect(0, 0, barCtx.canvas.width, barCtx.canvas.height);
                    barCtx.fillStyle = '#94a3b8';
                    barCtx.font = '14px system-ui';
                    barCtx.fillText('Sin datos', 20, 100);
                } else {
                    topExpenseCatChart = new Chart(barCtx, {
                        type: 'bar',
                        data: {
                            labels: sortedCats.map(c => c[0]),
                            datasets: [{ label: 'Monto gastado ($)', data: sortedCats.map(c => c[1]),
                                backgroundColor: '#f59e0b' }]
                        },
                        options: { responsive: true, maintainAspectRatio: true, indexAxis: 'y' }
                    });
                }
            }

            const ingresosGastosCtx = document.getElementById('ingresosGastosPieChart')?.getContext('2d');
            if (ingresosGastosCtx) {
                if (totalVentas === 0 && totalGastos === 0) {
                    ingresosGastosCtx.clearRect(0, 0, ingresosGastosCtx.canvas.width, ingresosGastosCtx.canvas
                        .height);
                    ingresosGastosCtx.fillStyle = '#94a3b8';
                    ingresosGastosCtx.font = '14px system-ui';
                    ingresosGastosCtx.fillText('Sin movimientos', 20, 100);
                } else {
                    ingresosGastosPieChart = new Chart(ingresosGastosCtx, {
                        type: 'pie',
                        data: {
                            labels: ['💰 Ingresos (Ventas)', '📉 Gastos'],
                            datasets: [{ data: [totalVentas, totalGastos], backgroundColor: ['#d63384',
                                    '#dc2626'], borderWidth: 0 }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        label: function(ctx) {
                                            let total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                            let pct = ((ctx.raw / total) * 100).toFixed(1);
                                            return `${ctx.label}: $${ctx.raw.toFixed(2)} (${pct}%)`;
                                        }
                                    }
                                },
                                legend: { position: 'bottom' }
                            }
                        }
                    });
                }
            }
            renderTablaGastos();
        }

        function renderTablaGastos() {
            const tbody = document.getElementById("gastosTableBody");
            if (!tbody) return;
            const categoryFilter = document.getElementById("gastoCategoryFilter")?.value || "all";
            const { start, end } = getAccountingDateRange();
            let gastosFiltrados = gastos.filter(g => new Date(g.fecha) >= start && new Date(g.fecha) <= end);
            if (categoryFilter !== "all") {
                gastosFiltrados = gastosFiltrados.filter(g => (g.categoria || "General") === categoryFilter);
            }
            tbody.innerHTML = gastosFiltrados.slice().reverse().map(g =>
                `<tr><td>${new Date(g.fecha).toLocaleString()}</td><td>${escapeHtml(g.desc)}</td><td>${escapeHtml(g.categoria||"General")}</td><td>$${g.monto.toFixed(2)}</td><td><button class="btn btn-danger" onclick="eliminarGasto(${g.id})">Eliminar</button></td></tr>`
                ).join('');
        }

                        fecha: new Date().toISOString(),

        // ========================================================================
        //  AVISOS
        // ========================================================================
        function obtenerCantidadAvisos() {
            if (!isAdmin && userMode !== 'admin') return 0;
            const hoy = new Date();
            const proximosDias = config.vencimientoAlertDays || 7;
            let count = 0;
            productos.forEach(p => {
                if (p.stock <= config.lowStockThreshold) count++;
                if (p.vencimiento) {
                    const fechaVen = new Date(p.vencimiento);
                    const diffDays = Math.ceil((fechaVen - hoy) / (1000 * 60 * 60 * 24));
                    if (diffDays <= proximosDias) count++;
                }
            });
            return count;
        }

        function actualizarContadorAvisos() {
            const contadorDiv = document.getElementById("alertaContador");
            if (!contadorDiv) return;
            const cantidad = obtenerCantidadAvisos();
            if (cantidad > 0 && (isAdmin || userMode === 'admin')) {
                contadorDiv.style.display = "inline-flex";
                contadorDiv.innerHTML = `🔔 ${cantidad}`;
                contadorDiv.style.background = "#dc2626";
            } else {
                contadorDiv.style.display = "none";
            }
        }

        function verificarAvisos(mostrarSoloSiHayNovedades = false) {
            if (!isAdmin && userMode !== 'admin') return;
            const hoy = new Date();
            const proximosDias = config.vencimientoAlertDays || 7;
            let avisos = [];
            productos.forEach(p => {
                if (p.stock <= config.lowStockThreshold) {
                    avisos.push({ tipo: 'stock', producto: p.nombre, stock: p.stock, umbral: config
                            .lowStockThreshold });
                }
            });
            productos.forEach(p => {
                if (p.vencimiento) {
                    const fechaVen = new Date(p.vencimiento);
                    const diffDays = Math.ceil((fechaVen - hoy) / (1000 * 60 * 60 * 24));
                    if (diffDays <= proximosDias) {
                        avisos.push({ tipo: 'vencimiento', producto: p.nombre, vencimiento: p.vencimiento,
                            dias: diffDays });
                    }
                }
            });

            if (avisos.length === 0) {
                if (!mostrarSoloSiHayNovedades) toast(
                    `✅ No hay productos con stock bajo (mínimo ${config.lowStockThreshold}) ni próximos a vencer (${proximosDias} días).`
                    );
                actualizarContadorAvisos();
                return;
            }

            let avisosHtml =
                `<div class="modal-card" style="max-width:520px;"><h3>🔔 AVISOS IMPORTANTES</h3><p style="font-size:0.9rem; margin-bottom:12px;">⚙️ Umbrales activos: Stock ≤ ${config.lowStockThreshold} | Vencimiento ≤ ${proximosDias} días</p><div style="max-height:400px; overflow-y:auto;">`;
            const avisosStock = avisos.filter(a => a.tipo === 'stock');
            if (avisosStock.length) {
                avisosHtml += `<h4 style="color: var(--danger); margin-top:12px;">📦 Stock bajo (≤ ${config.lowStockThreshold})</h4>`;
                avisosStock.forEach(a => {
                    avisosHtml +=
                        `<div class="aviso-item aviso-stock">⚠️ <strong>${escapeHtml(a.producto)}</strong> - Stock actual: ${a.stock} (mínimo recomendado: ${a.umbral})</div>`;
                });
            }
            const avisosVen = avisos.filter(a => a.tipo === 'vencimiento');
            if (avisosVen.length) {
                avisosHtml +=
                    `<h4 style="color: var(--warning); margin-top:12px;">⏰ Vencimiento próximo (próximos ${proximosDias} días)</h4>`;
                avisosVen.forEach(a => {
                    const texto = a.dias < 0 ? `VENCIDO hace ${Math.abs(a.dias)} días` :
                        `Vence en ${a.dias} días (${new Date(a.vencimiento).toLocaleDateString()})`;
                    avisosHtml +=
                        `<div class="aviso-item aviso-vencimiento">⚠️ <strong>${escapeHtml(a.producto)}</strong> - ${texto}</div>`;
                });
            }
            avisosHtml +=
                `<div style="display:flex; justify-content:flex-end; margin-top:20px;"><button id="cerrarAvisosBtn" class="btn btn-primary">Cerrar</button></div></div></div>`;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = avisosHtml;
            document.body.appendChild(modal);
            document.getElementById("cerrarAvisosBtn").onclick = () => modal.remove();
            actualizarContadorAvisos();
        }

        function renderTurnos() {

                    <h2>📅 Turnos de Trabajadores</h2>

                    </div>

                <h3>📊 Ventas por Empleado (hoy)</h3>

            document.getElementById("eliminarTodosTurnosBtn")?.addEventListener("click", () => eliminarTodosTurnos());

        function renderVentasPorEmpleado() {
            const container = document.getElementById("ventasPorEmpleadoContainer");
            if (!container) return;
            const hoy = new Date().toDateString();
            const ventasHoy = ventas.filter(v => !v.devuelta && new Date(v.fecha).toDateString() === hoy);

            const mapa = new Map();
            ventasHoy.forEach(v => {
                const id = v.vendedorId || 'sin_asignar';
                if (!mapa.has(id)) mapa.set(id, { total: 0, count: 0, items: [] });
                const data = mapa.get(id);
                data.total += v.total;
                data.count++;
                data.items.push(v);
            });

            let html = `<table class="data-table"><thead><tr><th>Empleado</th><th>Ventas</th><th>Total Vendido</th><th>Ticket Promedio</th></tr></thead><tbody>`;
            if (mapa.size === 0) {
                html += `<tr><td colspan="4" style="text-align:center;">No hay ventas hoy</td></tr>`;
            } else {
                for (let [id, data] of mapa) {
                    let nombre = 'Sin asignar';
                    if (id !== 'sin_asignar') {
                        const emp = empleados.find(e => e.id === id);
                        if (emp) nombre = emp.nombre;
                    }
                    const promedio = data.count > 0 ? data.total / data.count : 0;
                    html += `<tr>
                        <td>${escapeHtml(nombre)}</td>
                        <td>${data.count}</td>
                        <td>$${data.total.toFixed(2)}</td>
                        <td>$${promedio.toFixed(2)}</td>
                    </tr>`;
                }
            }
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

                empleados.push({ id: Date.now(), nombre: nombre.trim(), activo: true, estadoPago: "pendiente",
                pagos: [] });
                saveAll();
                renderTurnos();
                toast("Empleado agregado correctamente");
            }
        }

                    saveAll();
                    renderTurnos();
