        function actualizarEstadisticas(dias) {
            const ahora = new Date();
            const fechaInicio = new Date();
            fechaInicio.setDate(ahora.getDate() - dias);
            fechaInicio.setHours(0, 0, 0, 0);
            const ventasFiltradas = ventas.filter(v => !v.devuelta && new Date(v.fecha) >= fechaInicio);
            const totalVentas = ventasFiltradas.reduce((s, v) => s + v.total, 0);
            const totalGanancia = ventasFiltradas.reduce((s, v) => s + (v.ganancia || 0), 0);
            const ticketPromedio = ventasFiltradas.length ? totalVentas / ventasFiltradas.length : 0;
            const margenPromedio = totalVentas ? (totalGanancia / totalVentas * 100) : 0;
            const rotacionInventario = totalVentas / (productos.reduce((acc, p) => acc + p.stock, 1) / productos.length || 1);

            document.getElementById("statsKpiGrid").innerHTML = `
                <div class="kpi-card"><div class="kpi-title">💰 Ventas período</div><div class="kpi-value">$${totalVentas.toFixed(2)}</div></div>
                <div class="kpi-card"><div class="kpi-title">📈 Ganancia neta</div><div class="kpi-value">$${totalGanancia.toFixed(2)}</div></div>
                <div class="kpi-card"><div class="kpi-title">📊 Margen bruto</div><div class="kpi-value">${margenPromedio.toFixed(1)}%</div></div>
                <div class="kpi-card"><div class="kpi-title">🎫 Ticket promedio</div><div class="kpi-value">$${ticketPromedio.toFixed(2)}</div></div>
                <div class="kpi-card"><div class="kpi-title">🔄 Rotación stock</div><div class="kpi-value">${rotacionInventario.toFixed(1)}</div></div>
            `;

            let fechasMap = new Map();
            for (let d = new Date(fechaInicio); d <= ahora; d.setDate(d.getDate() + 1)) {
                let key = d.toISOString().split('T')[0];
                fechasMap.set(key, { ventas: 0, ganancia: 0, margen: 0 });
            }
            ventasFiltradas.forEach(v => {
                let key = new Date(v.fecha).toISOString().split('T')[0];
                if (fechasMap.has(key)) {
                    let item = fechasMap.get(key);
                    item.ventas += v.total;
                    item.ganancia += v.ganancia || 0;
                    if (item.ventas > 0) item.margen = (item.ganancia / item.ventas) * 100;
                }
            });
            let sortedDates = Array.from(fechasMap.keys()).sort();
            let ventasData = sortedDates.map(d => fechasMap.get(d).ventas);
            let gananciasData = sortedDates.map(d => fechasMap.get(d).ganancia);
            let margenData = sortedDates.map(d => fechasMap.get(d).margen);
            let labels = sortedDates.map(d => new Date(d).toLocaleDateString('es', { day: 'numeric', month: 'short' }));

            if (lineChartVentas) lineChartVentas.destroy();
            let ctxLine = document.getElementById('statsLineChart')?.getContext('2d');
            if (ctxLine) lineChartVentas = new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{ label: 'Ventas ($)', data: ventasData, borderColor: '#d63384',
                        backgroundColor: 'rgba(214,51,132,0.1)', tension: 0.3, fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            if (dualAxisChart) dualAxisChart.destroy();
            let ctxDual = document.getElementById('statsDualAxisChart')?.getContext('2d');
            if (ctxDual) dualAxisChart = new Chart(ctxDual, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Ventas ($)', data: ventasData, backgroundColor: '#d63384' },
                        { label: 'Ganancia ($)', data: gananciasData, backgroundColor: '#f59e0b' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true } } }
            });

            if (marginLineChart) marginLineChart.destroy();
            let ctxMargin = document.getElementById('statsMarginLineChart')?.getContext('2d');
            if (ctxMargin) marginLineChart = new Chart(ctxMargin, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{ label: 'Margen %', data: margenData, borderColor: '#dc2626',
                        backgroundColor: 'rgba(220,38,38,0.1)', tension: 0.3 }]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true,
                        max: 100 } } }
            });

            let productProfitMap = new Map();
            ventasFiltradas.forEach(v => {
                v.items.forEach(item => {
                    let profit = (item.precioUnitario - (productos.find(p => p.id === item.id)?.costo ||
                    0)) * item.cantidad;
                    productProfitMap.set(item.nombre, (productProfitMap.get(item.nombre) || 0) + profit);
                });
            });
            let topProfit = Array.from(productProfitMap.entries()).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if (profitProductChart) profitProductChart.destroy();
            let ctxProfit = document.getElementById('statsProfitProductChart')?.getContext('2d');
            if (ctxProfit) profitProductChart = new Chart(ctxProfit, {
                type: 'bar',
                data: {
                    labels: topProfit.map(p => p[0]),
                    datasets: [{ label: 'Ganancia ($)', data: topProfit.map(p => p[1]),
                        backgroundColor: '#10b981' }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            let hourData = new Array(24).fill(0);
            ventasFiltradas.forEach(v => { let hour = new Date(v.fecha).getHours();
                hourData[hour] += v.total; });
            if (heatmapChart) heatmapChart.destroy();
            let ctxHeat = document.getElementById('statsHeatmapChart')?.getContext('2d');
            if (ctxHeat) heatmapChart = new Chart(ctxHeat, {
                type: 'bar',
                data: {
                    labels: Array.from({ length: 24 }, (_, i) => `${i}:00`),
                    datasets: [{ label: 'Ventas por hora ($)', data: hourData, backgroundColor: '#8b5cf6' }]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true } } }
            });

            let nowDate = new Date();
            let currentMonth = nowDate.getMonth();
            let currentYear = nowDate.getFullYear();
            let prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
            let prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
            let currentMonthSales = ventas.filter(v => !v.devuelta && new Date(v.fecha).getMonth() === currentMonth &&
                new Date(v.fecha).getFullYear() === currentYear).reduce((a, b) => a + b.total, 0);
            let prevMonthSales = ventas.filter(v => !v.devuelta && new Date(v.fecha).getMonth() === prevMonth && new Date(
                v.fecha).getFullYear() === prevYear).reduce((a, b) => a + b.total, 0);
            if (monthCompareChart) monthCompareChart.destroy();
            let ctxMonth = document.getElementById('statsMonthCompareChart')?.getContext('2d');
            if (ctxMonth) monthCompareChart = new Chart(ctxMonth, {
                type: 'bar',
                data: {
                    labels: ['Mes Actual', 'Mes Anterior'],
                    datasets: [{ label: 'Ventas ($)', data: [currentMonthSales, prevMonthSales],
                        backgroundColor: ['#d63384', '#64748b'] }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            let productUnits = new Map();
            ventasFiltradas.forEach(v => {
                v.items.forEach(item => {
                    productUnits.set(item.nombre, (productUnits.get(item.nombre) || 0) + item.cantidad);
                });
            });
            let topUnits = Array.from(productUnits.entries()).sort((a, b) => b[1] - a[1]).slice(0, 5);
            if (barChartTopProductos) barChartTopProductos.destroy();
            let ctxBar = document.getElementById('statsBarChart')?.getContext('2d');
            if (ctxBar) barChartTopProductos = new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: topUnits.map(p => p[0]),
                    datasets: [{ label: 'Unidades vendidas', data: topUnits.map(p => p[1]),
                        backgroundColor: '#f59e0b' }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            let methodMap = new Map();
            ventasFiltradas.forEach(v => {
                let m = v.metodoPago || 'efectivo';
                methodMap.set(m, (methodMap.get(m) || 0) + v.total);
            });
            if (pieChartMetodos) pieChartMetodos.destroy();
            let ctxPie = document.getElementById('statsPieChart')?.getContext('2d');
            if (ctxPie) pieChartMetodos = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: Array.from(methodMap.keys()),
                    datasets: [{ data: Array.from(methodMap.values()), backgroundColor: ['#d63384',
                            '#f59e0b', '#10b981', '#dc2626'
                        ] }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });

            // ===== NUEVO GRÁFICO: Ventas por Empleado =====
            let employeeSales = new Map();
            empleados.forEach(emp => {
                if (emp.activo) employeeSales.set(emp.id, { nombre: emp.nombre, total: 0, count: 0 });
            });
            employeeSales.set('sin_asignar', { nombre: 'Sin asignar', total: 0, count: 0 });

            ventasFiltradas.forEach(v => {
                const id = v.vendedorId || 'sin_asignar';
                if (employeeSales.has(id)) {
                    const data = employeeSales.get(id);
                    data.total += v.total;
                    data.count++;
                } else {
                    const sinAsignar = employeeSales.get('sin_asignar');
                    sinAsignar.total += v.total;
                    sinAsignar.count++;
                }
            });

            const empData = Array.from(employeeSales.values()).filter(d => d.total > 0);
            const empLabels = empData.map(d => d.nombre);
            const empTotals = empData.map(d => d.total);

            if (employeeBarChart) employeeBarChart.destroy();
            let ctxEmp = document.getElementById('employeeBarChart')?.getContext('2d');
            if (ctxEmp) {
                if (empData.length === 0) {
                    ctxEmp.clearRect(0, 0, ctxEmp.canvas.width, ctxEmp.canvas.height);
                    ctxEmp.fillStyle = '#94a3b8';
                    ctxEmp.font = '14px system-ui';
                    ctxEmp.fillText('Sin ventas en el período', 20, 100);
                } else {
                    employeeBarChart = new Chart(ctxEmp, {
                        type: 'bar',
                        data: {
                            labels: empLabels,
                            datasets: [{
                                label: 'Total Ventas ($)',
                                data: empTotals,
                                backgroundColor: '#d63384',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    callbacks: {
                                        label: function(ctx) {
                                            const data = employeeSales.get(
                                            empleados.find(e => e.nombre === ctx.label)?.id || 'sin_asignar');
                                            const count = data ? data.count : 0;
                                            return `$${ctx.raw.toFixed(2)} (${count} ventas)`;
                                        }
                                    }
                                }
                            },
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                }
            }

            let bestEmp = null;
            let bestTotal = 0;
            for (let [key, val] of employeeSales) {
                if (val.total > bestTotal && key !== 'sin_asignar') {
                    bestTotal = val.total;
                    bestEmp = val.nombre;
                }
            }
            let insightMsg = "";
            if (margenPromedio < 30) insightMsg = "⚠️ Margen de ganancia bajo (<30%). Revisa precios de costo.";
            else if (margenPromedio > 60) insightMsg = "✅ Excelente margen de ganancia. ¡Sigue así!";
            else insightMsg = "📊 Margen saludable. Considera promociones para aumentar volumen.";
            if (ticketPromedio < 1000) insightMsg += " Ticket promedio bajo. Sugiere combos.";
            else if (ticketPromedio > 5000) insightMsg += " Ticket promedio alto. Ofrece programas de fidelidad.";
            if (bestEmp) insightMsg += ` 🏆 Empleado destacado: ${bestEmp} con $${bestTotal.toFixed(2)} en ventas.`;
            document.getElementById("insightsText").innerText = insightMsg;
            toast("Estadísticas actualizadas correctamente");
        }

        // ========================================================================
        //  HISTORIAL / REPORTES (con auditoría de borrados)
        // ========================================================================
        function renderHistorial() {
            let html = `
                <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;">
                    <input type="date" id="fechaDesde" style="padding:10px; border-radius:12px; font-size:0.95rem;">
                    <input type="date" id="fechaHasta" style="padding:10px; border-radius:12px; font-size:0.95rem;">
                    <input type="text" id="filtroHistorial" placeholder="Buscar..." style="padding:10px; border-radius:12px; font-size:0.95rem; flex:1;">
                    <button id="exportCSVBtn" class="btn btn-outline">Exportar CSV</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>Fecha</th><th>Productos</th><th>Total</th><th>Tipo</th><th>Método</th><th>Vendedor</th><th>Devuelta</th><th>Acciones</th></tr></thead>
                        <tbody id="historialBody"></tbody>
                    </table>
                </div>

                <hr>
                <h3>🗑️ Auditoría de eliminaciones (robos hormiga)</h3>
                <div style="margin-bottom:12px; display:flex; gap:10px; flex-wrap:wrap;">
                    <button id="limpiarAuditoriaBtn" class="btn btn-danger">🧹 Limpiar auditoría</button>
                    <button id="exportarAuditoriaBtn" class="btn btn-outline">📎 Exportar CSV</button>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead><tr><th>Fecha</th><th>Vendedor</th><th>Items</th><th>Total</th><th>Motivo</th></tr></thead>
                        <tbody id="auditoriaBody"></tbody>
                    </table>
                </div>
            `;
            document.getElementById("reportes").innerHTML = html;

            function cargarHistorial() {
                let filtroTexto = document.getElementById("filtroHistorial")?.value.toLowerCase() || "";
                let desde = document.getElementById("fechaDesde")?.value;
                let hasta = document.getElementById("fechaHasta")?.value;
                let filtradas = ventas.filter(v => {
                    let matchTexto = v.items.some(i => i.nombre.toLowerCase().includes(filtroTexto));
                    let fecha = new Date(v.fecha);
                    let matchFecha = true;
                    if (desde) matchFecha = matchFecha && fecha >= new Date(desde);
                    if (hasta) { let end = new Date(hasta);
                        end.setHours(23, 59, 59);
                        matchFecha = matchFecha && fecha <= end; }
                    return matchTexto && matchFecha;
                });
                let tbody = document.getElementById("historialBody");
                tbody.innerHTML = filtradas.map(v => {
                    let devuelta = v.devuelta ? '✅ Sí' : '❌ No';
                    let vendedor = 'Sin asignar';
                    if (v.vendedorId) {
                        const emp = empleados.find(e => e.id === v.vendedorId);
                        if (emp) vendedor = emp.nombre;
                    }
                    let metodoDisplay = v.metodoPago === 'mixto' ? 'Mixto' : (v.metodoPago || 'Efectivo');
                    let metodosDetalle = '';
                    if (v.pagoMixto && v.pagoMixto.length) {
                        metodosDetalle = ' (' + v.pagoMixto.map(m => `${m.metodo}: $${m.monto}`).join(' + ') + ')';
                    }
                    return `<tr>
                        <td>${new Date(v.fecha).toLocaleString()}</td>
                        <td>${escapeHtml(v.items.map(i=>`${i.cantidad} ${i.nombre}`).join(', '))}</td>
                        <td>$${v.total}</td>
                        <td>${v.esFiado?'Crédito':'Contado'}</td>
                        <td>${escapeHtml(metodoDisplay)}${metodosDetalle}</td>
                        <td>${escapeHtml(vendedor)}</td>
                        <td>${devuelta}</td>
                        <td>${!v.devuelta?`<button class="btn btn-danger" onclick="devolverVenta(${v.id})">Devolver</button>`:'Devuelta'}</td>
                    </tr>`;
                }).join('');
            }

            function cargarAuditoria() {
                const tbody = document.getElementById('auditoriaBody');
                if (!tbody) return;
                if (auditoriaBorrados.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">No hay registros de eliminaciones</td></tr>`;
                    return;
                }
                tbody.innerHTML = auditoriaBorrados.slice().reverse().map(item => {
                    let itemsStr = item.items.map(i => `${i.cantidad} ${i.nombre}`).join(', ');
                    return `<tr>
                        <td>${new Date(item.fecha).toLocaleString()}</td>
                        <td>${escapeHtml(item.vendedor)}</td>
                        <td>${escapeHtml(itemsStr)}</td>
                        <td>$${item.total.toFixed(2)}</td>
                        <td>${escapeHtml(item.motivo)}</td>
                    </tr>`;
                }).join('');
            }

            document.getElementById("filtroHistorial")?.addEventListener("input", cargarHistorial);
            document.getElementById("fechaDesde")?.addEventListener("change", cargarHistorial);
            document.getElementById("fechaHasta")?.addEventListener("change", cargarHistorial);

            document.getElementById("exportCSVBtn")?.addEventListener("click", () => {
                let filtradas = ventas.filter(v => true);
                let csvRows = [
                    ["Fecha", "Productos", "Total", "Tipo", "Método", "Vendedor", "Devuelta"]
                ];
                filtradas.forEach(v => {
                    let vendedor = 'Sin asignar';
                    if (v.vendedorId) {
                        const emp = empleados.find(e => e.id === v.vendedorId);
                        if (emp) vendedor = emp.nombre;
                    }
                    csvRows.push([new Date(v.fecha).toLocaleString(), v.items.map(i => `${i.cantidad} ${i.nombre}`)
                        .join(';'), v.total, v.esFiado ? "Crédito" : "Contado", v.metodoPago ||
                        'Efectivo', vendedor, v.devuelta ? "Sí" : "No"
                    ]);
                });
                let csvContent = csvRows.map(row => row.join(",")).join("\n");
                let blob = new Blob([csvContent], { type: "text/csv" });
                let a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "ventas_filtradas.csv";
                a.click();
                toast("CSV exportado");
            });

            document.getElementById("limpiarAuditoriaBtn")?.addEventListener("click", async () => {
                if (!await ensureAdmin()) return;
                if (!confirm("¿Eliminar todo el historial de auditoría?")) return;
                auditoriaBorrados = [];
                saveAll();
                cargarAuditoria();
                toast("Auditoría limpiada");
            });

            document.getElementById("exportarAuditoriaBtn")?.addEventListener("click", () => {
                if (auditoriaBorrados.length === 0) { toast("No hay datos", true); return; }
                let rows = [
                    ["Fecha", "Vendedor", "Items", "Total", "Motivo"]
                ];
                auditoriaBorrados.forEach(item => {
                    let itemsStr = item.items.map(i => `${i.cantidad} ${i.nombre}`).join(';');
                    rows.push([new Date(item.fecha).toLocaleString(), item.vendedor, itemsStr, item.total,
                        item.motivo
                    ]);
                });
                let csvContent = rows.map(row => row.join(",")).join("\n");
                let blob = new Blob([csvContent], { type: "text/csv" });
                let a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "auditoria_borrados.csv";
                a.click();
                toast("Auditoría exportada");
            });

            cargarHistorial();
            cargarAuditoria();
        }

        window.devolverVenta = async (idVenta) => {
            if (!await ensureAdmin()) return;
            let venta = ventas.find(v => v.id === idVenta);
            if (!venta || venta.devuelta) { toast("Venta no válida", true); return; }
            if (!confirm(`¿Devolver venta de $${venta.total}?`)) return;
            for (let item of venta.items) {
                let prod = productos.find(p => p.id === item.id);
                if (prod && !item.esSuelta) prod.stock += item.cantidad;
            }
            if (!venta.esFiado && caja.apertura) {
                // Restar el total de la caja (asumiendo que se devuelve en efectivo)
                caja.movimientos.push({
                    fecha: new Date().toISOString(),
                    tipo: "retiro",
                    monto: venta.total,
                    descripcion: `Devolución venta #${venta.id}`,
                    metodo: "efectivo"
                });
                caja.efectivo -= venta.total;
            }
            venta.devuelta = true;
            productos.forEach(p => p.ventasTotales = ventas.filter(v => !v.devuelta).reduce((acc, v) => acc + (v.items
                .filter(i => i.id === p.id).reduce((s, i) => s + i.cantidad, 0)), 0));
            saveAll();
            toast("Venta devuelta");
            refreshCurrentTab();
        };

        async function abrirModalProveedor(proveedor = null) {
            if (!await ensureAdmin()) return;
            const esEdicion = proveedor !== null;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>${esEdicion?'✏️ Editar Proveedor':'➕ Nuevo Proveedor'}</h3>
                    <input id="provNombre" placeholder="Nombre" value="${proveedor?escapeHtml(proveedor.nombre):''}">
                    <input id="provContacto" placeholder="Contacto" value="${proveedor?escapeHtml(proveedor.contacto||''):''}">
                    <input id="provTelefono" placeholder="Teléfono" value="${proveedor?escapeHtml(proveedor.telefono||''):''}">
                    <input id="provDeuda" type="number" placeholder="Deuda actual" step="0.01" value="${proveedor?proveedor.deuda||0:0}">
                    <label style="font-weight:600; margin:6px 0;">Productos que suministra (Ctrl+clic para múltiples):</label>
                    <select id="provProductos" multiple size="5" style="font-size:0.95rem;">${productos.map(prod => `<option value="${prod.id}" ${proveedor&&proveedor.productosIds?.includes(prod.id)?'selected':''}>${escapeHtml(prod.nombre)}</option>`).join('')}</select>
                    <div style="display:flex; gap:14px; margin-top:18px;">
                        <button id="guardarProvBtn" class="btn btn-primary">Guardar</button>
                        <button id="cancelProvBtn" class="btn btn-outline">Cancelar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#guardarProvBtn').onclick = () => {
                const nombre = modal.querySelector('#provNombre').value.trim();
                const contacto = modal.querySelector('#provContacto').value.trim();
                const telefono = modal.querySelector('#provTelefono').value.trim();
                const deuda = parseFloat(modal.querySelector('#provDeuda').value) || 0;
                const productosIds = Array.from(modal.querySelector('#provProductos').selectedOptions).map(opt =>
                    parseInt(opt.value));
                if (!nombre) { toast("Nombre obligatorio", true); return; }
                if (esEdicion) {
                    proveedor.nombre = nombre;
                    proveedor.contacto = contacto;
                    proveedor.telefono = telefono;
                    proveedor.deuda = deuda;
                    proveedor.productosIds = productosIds;
                    toast("Proveedor actualizado");
                } else {
                    proveedores.push({ id: Date.now(), nombre, contacto, telefono, productosIds, deuda, pedidos: [] });
                    toast("Proveedor agregado");
                }
                saveAll();
                renderProveedores();
                modal.remove();
            };
            modal.querySelector('#cancelProvBtn').onclick = () => modal.remove();
        }

        async function agregarPedidoProveedor() {
            if (!await ensureAdmin()) return;
            if (proveedores.length === 0) { toast("No hay proveedores", true); return; }
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>📦 Nuevo Pedido a Proveedor</h3>
                    <select id="provPedidoSelect" style="font-size:1rem;">${proveedores.map(p => `<option value="${p.id}">${escapeHtml(p.nombre)}</option>`).join('')}</select>
                    <input id="pedidoDesc" placeholder="Descripción del pedido (ej: 10 cajas de pan)">
                    <input id="pedidoMonto" type="number" placeholder="Monto del pedido" step="0.01">
                    <select id="pedidoEstado" style="font-size:1rem;">
                        <option value="Pendiente">Pendiente</option>
                        <option value="Levantado">Levantado</option>
                        <option value="Recibido">Recibido</option>
                    </select>
                    <div style="display:flex; gap:14px; margin-top:18px;">
                        <button id="guardarPedidoProvBtn" class="btn btn-primary">Registrar</button>
                        <button id="cancelPedidoProvBtn" class="btn btn-outline">Cancelar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#guardarPedidoProvBtn').onclick = () => {
                const provId = parseInt(modal.querySelector('#provPedidoSelect').value);
                const desc = modal.querySelector('#pedidoDesc').value.trim();
                const monto = parseFloat(modal.querySelector('#pedidoMonto').value) || 0;
                const estado = modal.querySelector('#pedidoEstado').value;
                if (!desc) { toast("Descripción requerida", true); return; }
                const prov = proveedores.find(p => p.id === provId);
                if (!prov) { toast("Proveedor no encontrado", true); return; }
                if (!prov.pedidos) prov.pedidos = [];
                prov.pedidos.push({
                    id: Date.now(),
                    fecha: new Date().toISOString(),
                    desc,
                    monto,
                    estado,
                    fechaActualizacion: new Date().toISOString()
                });
                if (estado === 'Recibido') {
                    prov.deuda = (prov.deuda || 0) + monto;
                }
                saveAll();
                renderProveedores();
                toast("Pedido registrado");
                modal.remove();
            };
            modal.querySelector('#cancelPedidoProvBtn').onclick = () => modal.remove();
        }

        window.gestionarPedidosProv = (provId) => {
            const prov = proveedores.find(p => p.id === provId);
            if (!prov) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>📋 Pedidos de ${escapeHtml(prov.nombre)}</h3>
                    <div style="max-height:300px; overflow-y:auto;">
                        ${(prov.pedidos||[]).length === 0 ? '<p>Sin pedidos registrados</p>' : prov.pedidos.map((ped, idx) => `
                            <div style="border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:8px;">
                                <div><strong>${escapeHtml(ped.desc)}</strong></div>
                                <div>Monto: $${ped.monto.toFixed(2)} | Estado: <strong>${ped.estado}</strong></div>
                                <div style="font-size:0.85rem;">${new Date(ped.fecha).toLocaleString()}</div>
                                <div style="margin-top:6px; display:flex; gap:8px; flex-wrap:wrap;">
                                    <button class="btn btn-outline" onclick="cambiarEstadoPedido(${provId}, ${idx}, 'Pendiente')">Pendiente</button>
                                    <button class="btn btn-outline" onclick="cambiarEstadoPedido(${provId}, ${idx}, 'Levantado')">Levantado</button>
                                    <button class="btn btn-outline" onclick="cambiarEstadoPedido(${provId}, ${idx}, 'Recibido')">Recibido</button>
                                    <button class="btn btn-danger" onclick="eliminarPedidoProv(${provId}, ${idx})">Eliminar</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="display:flex; gap:14px; margin-top:18px;">
                        <button id="cerrarPedidosModal" class="btn btn-primary">Cerrar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#cerrarPedidosModal').onclick = () => modal.remove();
        };

        window.cambiarEstadoPedido = (provId, idx, nuevoEstado) => {
            const prov = proveedores.find(p => p.id === provId);
            if (!prov || !prov.pedidos || idx >= prov.pedidos.length) return;
            const ped = prov.pedidos[idx];
            const estadoAnterior = ped.estado;
            ped.estado = nuevoEstado;
            ped.fechaActualizacion = new Date().toISOString();
            if (nuevoEstado === 'Recibido' && estadoAnterior !== 'Recibido') {
                prov.deuda = (prov.deuda || 0) + ped.monto;
            } else if (estadoAnterior === 'Recibido' && nuevoEstado !== 'Recibido') {
                prov.deuda = Math.max(0, (prov.deuda || 0) - ped.monto);
            }
            saveAll();
            renderProveedores();
            toast(`Pedido actualizado a ${nuevoEstado}`);
        };

        window.eliminarPedidoProv = (provId, idx) => {
            const prov = proveedores.find(p => p.id === provId);
            if (!prov || !prov.pedidos || idx >= prov.pedidos.length) return;
            if (!confirm("¿Eliminar este pedido?")) return;
            const ped = prov.pedidos[idx];
            if (ped.estado === 'Recibido') {
                prov.deuda = Math.max(0, (prov.deuda || 0) - ped.monto);
            }
            prov.pedidos.splice(idx, 1);
            saveAll();
            renderProveedores();
            toast("Pedido eliminado");
        };

        window.editarProveedor = (id) => {
            const proveedor = proveedores.find(p => p.id === id);
            if (proveedor) abrirModalProveedor(proveedor);
            else toast("Proveedor no encontrado", true);
        };

        window.eliminarProveedor = (id) => {
            if (confirm("¿Eliminar proveedor?")) {
                proveedores = proveedores.filter(p => p.id !== id);
                productos.forEach(p => { if (p.proveedorId === id) p.proveedorId = null; });
                saveAll();
                renderProveedores();
                toast("Proveedor eliminado");
            }
        };

        // ========================================================================
        //  TOGGLE EXTRAS
        // ========================================================================
        function toggleExtras() {
            const topBar = document.getElementById('topBar');
            const heroBanner = document.getElementById('heroBanner');
            const filters = document.getElementById('categoryFilters');
            const btn = document.getElementById('toggleExtrasBtn');

            const isHidden = localStorage.getItem('extrasHidden') === 'true';

            if (isHidden) {
                topBar.classList.remove('hidden');
                heroBanner.classList.remove('hidden');
                if (filters) filters.classList.remove('hidden');
                localStorage.setItem('extrasHidden', 'false');
                btn.innerHTML = '👁️ Ocultar extras';
                btn.style.background = 'transparent';
                btn.style.color = '';
            } else {
                topBar.classList.add('hidden');
                heroBanner.classList.add('hidden');
                if (filters) filters.classList.add('hidden');
                localStorage.setItem('extrasHidden', 'true');
                btn.innerHTML = '👁️ Mostrar extras';
                btn.style.background = 'var(--primary)';
                btn.style.color = 'white';
            }
        }

        // ========================================================================
        //  TABS / REFRESH
        // ========================================================================
        function refreshCurrentTab() {
            let active = document.querySelector('.tab-content.active')?.id;
            if (active === 'ventas') renderVentas();
            else if (active === 'rapido') renderModoRapido();
            else if (active === 'turnos') renderTurnos();
            else if (active === 'admin') renderAdmin();
            else if (active === 'caja') renderCaja();
            else if (active === 'contabilidad') renderContabilidad();
            else if (active === 'estadisticas') renderEstadisticas();
            else if (active === 'reportes') renderHistorial();
            else if (active === 'proveedores') renderProveedores();
            if (active !== 'rapido') stopQuickCamera();
        }

        function initTabs() {
            const tabs = ["ventas", "rapido", "turnos", "admin", "caja", "contabilidad", "estadisticas", "reportes",
                "proveedores"
            ];
            const nombres = ["VENTAS", "⚡ RÁPIDO", "📅 TURNOS", "ADMIN", "CAJA", "CONTAB", "ESTADÍSTICAS",
                "📜 HISTORIAL", "PROVEEDORES"
            ];
            const container = document.getElementById("tabsContainer");
            container.innerHTML = "";
            tabs.forEach((t, idx) => {
                let btn = document.createElement("button");
                btn.className = "tab-btn" + (idx === 0 ? " active" : "");
                btn.innerText = nombres[idx];
                btn.dataset.tab = t;
                btn.onclick = async () => {
                    if (t !== "ventas" && t !== "rapido" && t !== "turnos" && !isAdmin) {
                        if (!await ensureAdmin()) return;
                    }
                    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
                    btn.classList.add("active");
                    document.getElementById(t).classList.add("active");
                    refreshCurrentTab();
                };
                container.appendChild(btn);
            });
        }

        // ========================================================================
        //  INIT
        // ========================================================================
        async function init() {
            await loadAll();
            let darkMode = localStorage.getItem('darkMode') === 'true';
            if (darkMode) document.body.classList.add('dark');

            initTabs();
            renderVentas();
            actualizarHeader();
            await initBarcodeDetector();

            const toggleBtn = document.getElementById('toggleExtrasBtn');
            const extrasHidden = localStorage.getItem('extrasHidden') === 'true';
            if (extrasHidden) {
                document.getElementById('topBar').classList.add('hidden');
                document.getElementById('heroBanner').classList.add('hidden');
                const filters = document.getElementById('categoryFilters');
                if (filters) filters.classList.add('hidden');
                toggleBtn.innerHTML = '👁️ Mostrar extras';
                toggleBtn.style.background = 'var(--primary)';
                toggleBtn.style.color = 'white';
            } else {
                document.getElementById('topBar').classList.remove('hidden');
                document.getElementById('heroBanner').classList.remove('hidden');
                const filters = document.getElementById('categoryFilters');
                if (filters) filters.classList.remove('hidden');
                toggleBtn.innerHTML = '👁️ Ocultar extras';
                toggleBtn.style.background = 'transparent';
                toggleBtn.style.color = '';
            }
            toggleBtn.addEventListener('click', toggleExtras);

            document.getElementById("darkModeBottomBtn").onclick = () => {
                document.body.classList.toggle('dark');
                localStorage.setItem('darkMode', document.body.classList.contains('dark'));
            };
            document.getElementById("configBottomBtn").onclick = showConfig;
            document.getElementById("lockBottomBtn").onclick = lockScreen;
            document.getElementById("whatsappBottomBtn").onclick = () => {
                if (carrito.length) mostrarModalWhatsApp();
                else toast("Carrito vacío", true);
            };
            document.getElementById("backupBtn").onclick = () => {
                const data = JSON.stringify({ productos, ventas, turnosCaja, gastos, proveedores, caja, negocio,
                    config, categorias, empleados, turnos, auditoriaBorrados }, null, 2);
                const blob = new Blob([data], { type: "application/json" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "kiosco_backup.json";
                a.click();
                toast("Backup descargado");
            };
            document.getElementById("restoreBtn").onclick = () => {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "application/json";
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        try {
                            const data = JSON.parse(ev.target.result);
                            Object.assign(productos, data.productos);
                            Object.assign(ventas, data.ventas);
                            Object.assign(turnosCaja, data.turnosCaja || []);
                            Object.assign(gastos, data.gastos);
                            Object.assign(proveedores, data.proveedores);
                            Object.assign(caja, data.caja);
                            Object.assign(negocio, data.negocio);
                            Object.assign(config, data.config);
                            Object.assign(categorias, data.categorias);
                            if (data.empleados) Object.assign(empleados, data.empleados);
                            if (data.turnos) Object.assign(turnos, data.turnos);
                            if (data.auditoriaBorrados) Object.assign(auditoriaBorrados, data.auditoriaBorrados);
                            saveAll();
                            location.reload();
                        } catch (err) { toast("Archivo inválido", true); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            };
            document.getElementById("alertasBtn").onclick = () => { verificarAvisos(false); };
            const contadorDiv = document.getElementById("alertaContador");
            if (contadorDiv) contadorDiv.onclick = () => { verificarAvisos(false); };

            const loggedIn = await mostrarLogin();
            if (!loggedIn) {
                document.body.innerHTML =
                    `<div style="display:flex; align-items:center; justify-content:center; height:100vh; background:#d63384; color:white; font-family:'Syne',sans-serif; flex-direction:column; gap:24px;"><h1 style="font-size:3rem;">🔒 Acceso denegado</h1><p style="font-size:1.2rem;">Debes ingresar la contraseña para utilizar el sistema.</p><button onclick="location.reload()" style="padding:14px 32px; border:none; border-radius:40px; background:#ffab00; color:#1a0b12; font-weight:bold; font-size:1.1rem; cursor:pointer;">Reintentar</button></div>`;
                return;
            }

            setInterval(() => {
                actualizarHeader();
                if (userMode === "admin" && isAdmin && Date.now() - lastActivity > SESSION_TIMEOUT) {
                    isAdmin = false;
                    toast("Sesión expirada", true);
                }
                actualizarContadorAvisos();
            }, 1000);
        }

        init();

        window.agregarAlCarrito = agregarAlCarrito;
        window.cambiarCantidad = cambiarCantidad;
        window.editarProductoModal = window.editarProductoModal;
        window.eliminarProducto = window.eliminarProducto;
        window.eliminarProveedor = window.eliminarProveedor;
        window.devolverVenta = window.devolverVenta;
        window.eliminarCategoria = window.eliminarCategoria;
        window.eliminarGasto = window.eliminarGasto;
        window.editarProveedor = window.editarProveedor;
        window.marcarPagadoEmpleado = window.marcarPagadoEmpleado;
        window.verHistorialPagosEmpleado = window.verHistorialPagosEmpleado;
        window.editarTurno = window.editarTurno;
        window.eliminarTurno = window.eliminarTurno;
        window.cambiarEstadoPedido = window.cambiarEstadoPedido;
        window.eliminarPedidoProv = window.eliminarPedidoProv;
        window.gestionarPedidosProv = window.gestionarPedidosProv;
        window.editarEmpleadoAdmin = window.editarEmpleadoAdmin;
        window.eliminarEmpleadoAdmin = window.eliminarEmpleadoAdmin;
    </script>

    <!-- ========================================================================
    FIREBASE SYNC (opcional)
    ======================================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqWMGTraqPEvUEgejRJ20Ey4FaVPo7mjY",
            authDomain: "kiosco-8ae45.firebaseapp.com",
            databaseURL: "https://kiosco-8ae45-default-rtdb.firebaseio.com",
            projectId: "kiosco-8ae45",
            storageBucket: "kiosco-8ae45.firebasestorage.app",
            messagingSenderId: "635558725301",
            appId: "1:635558725301:web:8a399c734ad518ea5da0fc",
            measurementId: "G-16R0MR12G8"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        const dataRef = ref(db, 'kioscoProData');

        let updatingFromFirebase = false;

        function pushToFirebase() {
            if (updatingFromFirebase) return;
            const allData = {
                productos: window.productos,
                ventas: window.ventas,
                turnosCaja: window.turnosCaja,
                gastos: window.gastos,
                proveedores: window.proveedores,
                caja: window.caja,
                negocio: window.negocio,
                config: window.config,
                categorias: window.categorias,
                empleados: window.empleados,
                turnos: window.turnos,
                auditoriaBorrados: window.auditoriaBorrados,
                timestamp: serverTimestamp()
            };
            set(dataRef, allData).catch(err => console.error("Error Firebase:", err));
        }
        window.pushToFirebase = pushToFirebase;

        const originalSaveAll = window.saveAll;
        window.saveAll = function() {
            originalSaveAll();
            pushToFirebase();
        };

        onValue(dataRef, (snapshot) => {
            if (!snapshot.exists()) return;
            if (updatingFromFirebase) return;
            const fbData = snapshot.val();
            updatingFromFirebase = true;

            let changed = false;
            if (fbData.productos) { window.productos.splice(0, window.productos.length, ...fbData.productos);
                changed = true; }
            if (fbData.ventas) { window.ventas.splice(0, window.ventas.length, ...fbData.ventas);
                changed = true; }
            if (fbData.turnosCaja) { window.turnosCaja.splice(0, window.turnosCaja.length, ...fbData.turnosCaja);
                changed = true; }
            if (fbData.gastos) { window.gastos.splice(0, window.gastos.length, ...fbData.gastos);
                changed = true; }
            if (fbData.proveedores) { window.proveedores.splice(0, window.proveedores.length, ...fbData.proveedores);
                changed = true; }
            if (fbData.caja) { Object.assign(window.caja, fbData.caja);
                changed = true; }
            if (fbData.negocio) { Object.assign(window.negocio, fbData.negocio);
                changed = true; }
            if (fbData.config) { Object.assign(window.config, fbData.config);
                changed = true; }
            if (fbData.categorias) { window.categorias.splice(0, window.categorias.length, ...fbData.categorias);
                changed = true; }
            if (fbData.empleados) { window.empleados.splice(0, window.empleados.length, ...fbData.empleados);
                changed = true; }
            if (fbData.turnos) { window.turnos.splice(0, window.turnos.length, ...fbData.turnos);
                changed = true; }
            if (fbData.auditoriaBorrados) { window.auditoriaBorrados.splice(0, window.auditoriaBorrados.length, ...
                    fbData.auditoriaBorrados);
                changed = true; }

            if (changed) {
                originalSaveAll();
                if (window.refreshCurrentTab) window.refreshCurrentTab();
                if (window.actualizarHeader) window.actualizarHeader();
                if (window.actualizarContadorAvisos) window.actualizarContadorAvisos();
                toast("🔄 Datos sincronizados desde la nube");
            }
            updatingFromFirebase = false;
        }, (error) => {
            console.warn("Firebase onValue error:", error);
            updatingFromFirebase = false;
        });

        window.addEventListener('load', () => {
            get(dataRef).then(snapshot => {
                if (!snapshot.exists()) return;
                const fbData = snapshot.val();
                let changed = false;
                if (fbData.productos) { window.productos.splice(0, window.productos.length, ...fbData.productos);
                    changed = true; }
                if (fbData.ventas) { window.ventas.splice(0, window.ventas.length, ...fbData.ventas);
                    changed = true; }
                if (fbData.turnosCaja) { window.turnosCaja.splice(0, window.turnosCaja.length, ...fbData
                        .turnosCaja);
                    changed = true; }
                if (fbData.gastos) { window.gastos.splice(0, window.gastos.length, ...fbData.gastos);
                    changed = true; }
                if (fbData.proveedores) { window.proveedores.splice(0, window.proveedores.length, ...fbData
                        .proveedores);
                    changed = true; }
                if (fbData.caja) { Object.assign(window.caja, fbData.caja);
                    changed = true; }
                if (fbData.negocio) { Object.assign(window.negocio, fbData.negocio);
                    changed = true; }
                if (fbData.config) { Object.assign(window.config, fbData.config);
                    changed = true; }
                if (fbData.categorias) { window.categorias.splice(0, window.categorias.length, ...fbData
                        .categorias);
                    changed = true; }
                if (fbData.empleados) { window.empleados.splice(0, window.empleados.length, ...fbData
                        .empleados);
                    changed = true; }
                if (fbData.turnos) { window.turnos.splice(0, window.turnos.length, ...fbData.turnos);
                    changed = true; }
                if (fbData.auditoriaBorrados) { window.auditoriaBorrados.splice(0, window.auditoriaBorrados
                        .length, ...fbData.auditoriaBorrados);
                    changed = true; }
                if (changed) {
                    originalSaveAll();
                    if (window.refreshCurrentTab) window.refreshCurrentTab();
                    if (window.actualizarHeader) window.actualizarHeader();
                    if (window.actualizarContadorAvisos) window.actualizarContadorAvisos();
                }
            }).catch(err => console.warn("Firebase read error:", err));
        });
    </script>
